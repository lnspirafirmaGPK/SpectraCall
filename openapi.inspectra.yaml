openapi: 3.1.0
info:
  title: Inspectra Governance API
  version: 1.0.0
  description: Repo-ready OpenAPI 3.1 spec split by tag.
servers:
  - url: https://api.inspectra.example.com
    description: Production
  - url: https://staging-api.inspectra.example.com
    description: Staging
tags:
  - { name: Alerts }
  - { name: Freeze }
  - { name: Replay }
  - { name: Gems }
  - { name: Approvals }
security:
  - oidc: []
paths:
  /v1/alerts: { $ref: './openapi/alerts.yaml#/paths/~1v1~1alerts' }
  /v1/alerts/{alert_id}: { $ref: './openapi/alerts.yaml#/paths/~1v1~1alerts~1{alert_id}' }
  /v1/alerts/{alert_id}/views: { $ref: './openapi/alerts.yaml#/paths/~1v1~1alerts~1{alert_id}~1views' }
  /v1/freeze-actions: { $ref: './openapi/freeze.yaml#/paths/~1v1~1freeze-actions' }
  /v1/replay/decisions/{decision_id}: { $ref: './openapi/replay.yaml#/paths/~1v1~1replay~1decisions~1{decision_id}' }
  /v1/replay/traces/{trace_id}: { $ref: './openapi/replay.yaml#/paths/~1v1~1replay~1traces~1{trace_id}' }
  /v1/replay/views: { $ref: './openapi/replay.yaml#/paths/~1v1~1replay~1views' }
  /v1/replay/traces/{trace_id}/annotations: { $ref: './openapi/replay.yaml#/paths/~1v1~1replay~1traces~1{trace_id}~1annotations' }
  /v1/replay/traces/{trace_id}/export: { $ref: './openapi/replay.yaml#/paths/~1v1~1replay~1traces~1{trace_id}~1export' }
  /v1/gems/drafts: { $ref: './openapi/gems.yaml#/paths/~1v1~1gems~1drafts' }
  /v1/gems/drafts/{gem_draft_id}: { $ref: './openapi/gems.yaml#/paths/~1v1~1gems~1drafts~1{gem_draft_id}' }
  /v1/gems/drafts/{gem_draft_id}/submit: { $ref: './openapi/gems.yaml#/paths/~1v1~1gems~1drafts~1{gem_draft_id}~1submit' }
  /v1/gems/inbox: { $ref: './openapi/gems.yaml#/paths/~1v1~1gems~1inbox' }
  /v1/gems/{gem_id}: { $ref: './openapi/gems.yaml#/paths/~1v1~1gems~1{gem_id}' }
  /v1/approvals: { $ref: './openapi/approvals.yaml#/paths/~1v1~1approvals' }
  /v1/approvals/{approval_id}: { $ref: './openapi/approvals.yaml#/paths/~1v1~1approvals~1{approval_id}' }
  /v1/approvals/{approval_id}/decisions: { $ref: './openapi/approvals.yaml#/paths/~1v1~1approvals~1{approval_id}~1decisions' }
components:
  $ref: './openapi/common.yaml#/components'
